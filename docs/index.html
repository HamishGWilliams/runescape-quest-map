  </head>
  <body>
    <div id="app">
      <aside class="sidebar" aria-label="Map controls">
        <div class="brand">
          <span class="eyebrow">RS3 Route Lab</span>
          <h1>Quest Map</h1>
        </div>

        <label class="field">
          <span>Map</span>
          <select id="map-select"></select>
        </label>

        <div class="field">
          <span>Plane</span>
          <div class="segmented" role="group" aria-label="Plane selector">
            <button type="button" data-plane="0" class="active">0</button>
            <button type="button" data-plane="1">1</button>
            <button type="button" data-plane="2">2</button>
            <button type="button" data-plane="3">3</button>
          </div>
        </div>

        <label class="toggle">
          <input id="icon-toggle" type="checkbox" checked />
          <span>Icon tile layer</span>
        </label>

        <label class="toggle">
          <input id="overlay-toggle" type="checkbox" checked />
          <span>Quest overlay</span>
        </label>

        <div class="coordinate-card">
          <span>Center</span>
          <output id="coordinate-readout">x: -, y: -, z: -</output>
        </div>

        <section class="panel picker-panel">
          <h2>Coordinate picker</h2>

          <div class="actions split-actions">
            <button id="pick-point" type="button">Pick point</button>
            <button id="select-area" type="button">Select area</button>
            <button id="clear-selection" type="button">Clear</button>
          </div>

          <div class="capture-grid">
            <div>
              <span>Pointer</span>
              <output id="pointer-readout">x: -, y: -, z: -</output>
            </div>
            <div>
              <span>Point</span>
              <output id="point-readout">not selected</output>
            </div>
            <div>
              <span>Area</span>
              <output id="area-readout">not selected</output>
            </div>
          </div>

          <div class="actions split-actions">
            <button id="copy-point" type="button">Copy point</button>
            <button id="copy-area" type="button">Copy area</button>
          </div>
        </section>

        <section class="panel">
          <h2>Quest steps workbook</h2>
          <label class="file-button">
            <input id="workbook-input" type="file" accept=".xlsx,.xls" />
            <span>Load workbook</span>
          </label>
          <output id="workbook-status">No workbook loaded</output>
        </section>

        <div class="actions">
          <button id="copy-link" type="button">Copy map link</button>
          <button id="add-marker" type="button">Add marker at center</button>
        </div>

        <section class="panel">
          <h2>Overlay features</h2>
          <div id="feature-list" class="feature-list"></div>
        </section>
      </aside>

      <main class="map-shell">
        <div id="map" aria-label="RuneScape 3 map"></div>
      </main>
    </div>
  </body>
</html>
